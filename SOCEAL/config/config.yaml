# SOCeal – Project VALE Configuration
# ====================================

# Safe mode: if true, SOCeal only monitors and logs — no destructive actions
safe_mode: true

# UI settings
ui:
  host: "127.0.0.1"
  port: 8081
  open_browser: true

# Sensor polling intervals (seconds)
polling:
  eventlog: 1
  process: 5
  file: 1

# Event log channels to monitor
eventlog_channels:
  - Security
  - System
  - Application

# Directories to watch for suspicious files
watch_paths:
  - "~/Downloads"
  - "%TEMP%"
  - "~/AppData/Roaming"

# Quarantine and log directories (relative to project root)
quarantine_dir: "data/quarantine"
log_dir: "data/logs"

# Rules file
rules_file: "config/rules.json"

# Suspicious process names (additional — extends built-in list)
suspicious_processes:
  - mimikatz.exe
  - cobalt
  - nc.exe
  - nc64.exe
  - ncat.exe
  - plink.exe
  - psexec.exe
  - psexec64.exe
  - procdump.exe
  - lazagne.exe
  - rubeus.exe
  - sharphound.exe
  - bloodhound.exe
  - chisel.exe
  - socat.exe

# Suspicious file extensions
suspicious_extensions:
  - .exe
  - .scr
  - .pif
  - .bat
  - .cmd
  - .ps1
  - .vbs
  - .js
  - .wsf
  - .hta
  - .cpl
  - .msi
